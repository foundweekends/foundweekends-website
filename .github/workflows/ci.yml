name: ci
on:
  push:
  pull_request:
  schedule:
  - cron: '0 18 * * 4'
jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'foundweekends' }}
    steps:
    - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: 17
        distribution: temurin
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v6.4.8
    - uses: sbt/setup-sbt@v1
    - run: sbt -v --server test makeSite
    - id: generate_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      if: ${{ github.repository_owner == 'foundweekends' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      with:
        client-id: 89697
        private-key: ${{ secrets.FOUNDWEEKENDS_BOT_KEY }}
        owner: "foundweekends"
        repositories: "foundweekends.github.io"
    - name: Push to gh-pages
      if: ${{ github.repository_owner == 'foundweekends' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
      with:
        repository-name: "foundweekends/foundweekends.github.io"
        token: ${{ steps.generate_token.outputs.token }}
        branch: master
        folder: site
        clean: true
